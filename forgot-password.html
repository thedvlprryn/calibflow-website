<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — CalibFlow</title>
  <meta name="description" content="Reset your CalibFlow password.">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 16px; }
    .reset-container { max-width: 400px; width: 100%; }
    .reset-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
    .reset-logo .logo-name { font-family: var(--serif); font-size: 24px; color: var(--white); letter-spacing: -0.5px; }
    .reset-logo .logo-name span { color: var(--cyan); }
    .reset-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 40px; text-align: center;
    }
    .reset-card h1 { font-family: var(--sans); font-weight: 700; font-size: 24px; color: var(--white); margin-bottom: 8px; }
    .reset-card .subtitle { font-family: var(--sans); font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .reset-card .input-group { text-align: left; margin-bottom: 20px; }
    .success-state { display: none; text-align: center; }
    .success-state.active { display: block; animation: fadeInUp 0.3s ease-out; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-title { font-family: var(--sans); font-size: 20px; font-weight: 600; color: var(--white); margin-bottom: 8px; }
    .success-sub { font-family: var(--sans); font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .back-link { font-family: var(--sans); font-size: 13px; color: var(--cyan); }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-logo">
      <svg width="36" height="36" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="11" fill="#1E5FAD"/>
        <rect width="44" height="44" rx="11" fill="url(#lg-fp)" opacity="0.6"/>
        <path d="M22 8C14.268 8 8 14.268 8 22C8 29.732 14.268 36 22 36C29.732 36 36 29.732 36 22" stroke="#0EC7C7" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="22" cy="22" r="3" fill="#0EC7C7"/>
        <path d="M22 22L28 16" stroke="#0EC7C7" stroke-width="2" stroke-linecap="round"/>
        <defs><linearGradient id="lg-fp" x1="0" y1="0" x2="44" y2="44"><stop stop-color="#0EC7C7"/><stop offset="1" stop-color="#0EC7C7" stop-opacity="0"/></linearGradient></defs>
      </svg>
      <div class="logo-name">Calib<span>Flow</span></div>
    </div>

    <div class="reset-card anim-fade-in-up">
      <!-- Request Form -->
      <div id="request-form">
        <h1>Reset your password</h1>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>
        <div class="input-group">
          <label class="field-label" for="reset-email">Work Email</label>
          <input type="email" id="reset-email" class="input-field" placeholder="you@company.com">
          <div class="input-error" id="email-error" style="display:none;">Please enter a valid email address</div>
        </div>
        <button class="btn btn-primary btn-full" id="reset-btn" onclick="sendResetLink()" style="padding:14px;">Send Reset Link</button>
        <div style="margin-top:20px;">
          <a href="login.html" class="back-link">← Back to Sign In</a>
        </div>
      </div>

      <!-- Success State -->
      <div class="success-state" id="success-state">
        <div class="success-icon">✉️</div>
        <div class="success-title">Check your email</div>
        <div class="success-sub">We sent a reset link to <strong id="sent-email"></strong>.</div>
        <a href="login.html" class="back-link">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function sendResetLink() {
      const email = document.getElementById('reset-email').value.trim();
      document.getElementById('email-error').style.display = 'none';
      document.getElementById('reset-email').classList.remove('error');

      if (!email || !email.includes('@')) {
        document.getElementById('email-error').style.display = 'block';
        document.getElementById('reset-email').classList.add('error');
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';

      setTimeout(() => {
        document.getElementById('request-form').style.display = 'none';
        document.getElementById('sent-email').textContent = email;
        document.getElementById('success-state').classList.add('active');
      }, 1500);
    }
  </script>
</body>
</html>
