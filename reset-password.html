<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Password — CalibFlow</title>
  <meta name="description" content="Set a new password for your CalibFlow account.">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 16px; }
    .reset-container { max-width: 400px; width: 100%; }
    .reset-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
    .reset-logo .logo-name { font-family: var(--serif); font-size: 24px; color: var(--white); letter-spacing: -0.5px; }
    .reset-logo .logo-name span { color: var(--cyan); }
    .reset-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 40px;
    }
    .reset-card h1 { font-family: var(--sans); font-weight: 700; font-size: 24px; color: var(--white); margin-bottom: 28px; text-align: center; }
    .strength-bar-container { display: flex; gap: 4px; margin-top: 8px; }
    .strength-segment { height: 3px; flex: 1; border-radius: 2px; background: rgba(255,255,255,0.1); transition: background 0.3s; }
    .strength-text { font-family: var(--mono); font-size: 10px; margin-top: 4px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-logo">
      <svg width="36" height="36" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="11" fill="#1E5FAD"/>
        <rect width="44" height="44" rx="11" fill="url(#lg-rp)" opacity="0.6"/>
        <path d="M22 8C14.268 8 8 14.268 8 22C8 29.732 14.268 36 22 36C29.732 36 36 29.732 36 22" stroke="#0EC7C7" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="22" cy="22" r="3" fill="#0EC7C7"/>
        <path d="M22 22L28 16" stroke="#0EC7C7" stroke-width="2" stroke-linecap="round"/>
        <defs><linearGradient id="lg-rp" x1="0" y1="0" x2="44" y2="44"><stop stop-color="#0EC7C7"/><stop offset="1" stop-color="#0EC7C7" stop-opacity="0"/></linearGradient></defs>
      </svg>
      <div class="logo-name">Calib<span>Flow</span></div>
    </div>

    <div class="reset-card anim-fade-in-up">
      <h1>Create new password</h1>

      <form onsubmit="updatePassword(event)">
        <div class="input-group">
          <label class="field-label" for="new-password">New Password</label>
          <input type="password" id="new-password" class="input-field" placeholder="Min 8 characters" oninput="checkStrength()">
          <div class="strength-bar-container">
            <div class="strength-segment" id="str-1"></div>
            <div class="strength-segment" id="str-2"></div>
            <div class="strength-segment" id="str-3"></div>
            <div class="strength-segment" id="str-4"></div>
          </div>
          <div class="strength-text" id="strength-text"></div>
          <div class="input-error" id="pw-error" style="display:none;">Password must be at least 8 characters</div>
        </div>

        <div class="input-group">
          <label class="field-label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="input-field" placeholder="Re-enter password">
          <div class="input-error" id="confirm-error" style="display:none;">Passwords don't match</div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="update-btn" style="padding:14px;">Update Password</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function checkStrength() {
      const pw = document.getElementById('new-password').value;
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const colors = ['#EF4444', '#F59E0B', '#F59E0B', '#10B981'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];

      for (let i = 1; i <= 4; i++) {
        document.getElementById(`str-${i}`).style.background = i <= score ? colors[Math.max(0, score - 1)] : 'rgba(255,255,255,0.1)';
      }
      const text = document.getElementById('strength-text');
      if (pw.length > 0) {
        text.textContent = labels[Math.max(0, score - 1)] || 'Weak';
        text.style.color = colors[Math.max(0, score - 1)] || '#EF4444';
      } else {
        text.textContent = '';
      }
    }

    function updatePassword(e) {
      e.preventDefault();
      document.querySelectorAll('.input-error').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.input-field').forEach(el => el.classList.remove('error'));

      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      let valid = true;

      if (pw.length < 8) {
        document.getElementById('pw-error').style.display = 'block';
        document.getElementById('new-password').classList.add('error');
        valid = false;
      }
      if (pw !== confirm) {
        document.getElementById('confirm-error').style.display = 'block';
        document.getElementById('confirm-password').classList.add('error');
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('update-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Updating...';

      setTimeout(() => {
        showToast('Password updated. Sign in with your new password.', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      }, 1500);
    }
  </script>
</body>
</html>
