<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibration Calendar — CalibFlow</title>
  <meta name="description" content="Visual timeline of upcoming calibrations.">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .cal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .cal-layout { display: grid; grid-template-columns: 200px 1fr; gap: 24px; }

    /* Filter sidebar */
    .cal-filters {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 20px; height: fit-content;
    }
    .cal-filter-group { margin-bottom: 20px; }
    .cal-filter-title { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }

    /* Calendar Grid */
    .cal-container {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; overflow: hidden;
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: center; gap: 24px;
      padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .cal-nav-btn {
      background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: all 0.2s;
    }
    .cal-nav-btn:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    .cal-month { font-family: var(--sans); font-weight: 600; font-size: 18px; color: var(--white); min-width: 200px; text-align: center; }

    .cal-day-headers {
      display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .cal-day-header {
      padding: 10px; text-align: center; font-family: var(--mono); font-size: 10px;
      color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    }

    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
    .cal-cell {
      min-height: 90px; border: 1px solid rgba(255,255,255,0.04); padding: 8px;
      position: relative; transition: background 0.15s;
    }
    .cal-cell:hover { background: rgba(255,255,255,0.02); }
    .cal-cell.today { border-color: rgba(14,199,199,0.3); background: rgba(14,199,199,0.03); }
    .cal-cell.other-month { opacity: 0.3; }
    .cal-day-num { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .cal-cell.today .cal-day-num { color: var(--cyan); font-weight: 500; }

    .cal-event {
      display: flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px;
      font-family: var(--sans); font-size: 10px; margin-bottom: 2px; cursor: pointer;
      transition: opacity 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cal-event:hover { opacity: 0.8; }
    .cal-event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .cal-event.overdue { background: rgba(239,68,68,0.1); color: #F87171; }
    .cal-event.overdue .cal-event-dot { background: #EF4444; }
    .cal-event.due-soon { background: rgba(245,158,11,0.1); color: #FBBF24; }
    .cal-event.due-soon .cal-event-dot { background: #F59E0B; }
    .cal-event.scheduled { background: rgba(58,130,212,0.1); color: var(--blue-light); }
    .cal-event.scheduled .cal-event-dot { background: var(--blue-light); }
    .cal-event.compliant { background: rgba(16,185,129,0.06); color: #34D399; }
    .cal-event.compliant .cal-event-dot { background: #10B981; }

    /* Event Popover */
    .cal-popover {
      position: fixed; z-index: 100;
      background: rgba(11,31,58,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 16px; min-width: 240px; backdrop-filter: blur(8px);
      display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .cal-popover.active { display: block; }
    .pop-name { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
    .pop-info { font-family: var(--sans); font-size: 13px; color: var(--muted); margin-bottom: 2px; }
    .pop-link { font-family: var(--sans); font-size: 13px; color: var(--cyan); margin-top: 8px; display: block; }

    /* List view */
    .cal-list { display: none; }
    .cal-list.active { display: block; }
    .list-date-group { margin-bottom: 24px; }
    .list-date { font-family: var(--mono); font-size: 11px; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .list-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer;
    }
    .list-item:hover { background: rgba(255,255,255,0.02); border-radius: 8px; padding-left: 8px; margin-left: -8px; }

    @media (max-width: 768px) {
      .cal-layout { grid-template-columns: 1fr; }
      .cal-filters { display: none; }
      .cal-cell { min-height: 60px; padding: 4px; }
      .cal-event { font-size: 8px; }
    }
  </style>
</head>
<body>
  <nav class="topnav" id="topnav"></nav>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="app-layout">
    <div class="page-content">
      <div class="page-header">
        <h1 class="h1">Calibration Calendar</h1>
        <div class="flex gap-12">
          <div class="segment-control" id="view-toggle">
            <button class="segment-btn active" onclick="setView('month')">Month</button>
            <button class="segment-btn" onclick="setView('week')">Week</button>
            <button class="segment-btn" onclick="setView('list')">List</button>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openScheduleModal()">+ Schedule</button>
        </div>
      </div>

      <div class="cal-layout">
        <!-- Sidebar filters -->
        <div class="cal-filters">
          <div class="cal-filter-group">
            <div class="cal-filter-title">Locations</div>
            <div id="loc-filters"></div>
          </div>
          <div class="cal-filter-group">
            <div class="cal-filter-title">Categories</div>
            <div id="cat-filters"></div>
          </div>
        </div>

        <!-- Calendar -->
        <div>
          <div class="cal-container" id="cal-month-view">
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="changeMonth(-1)">←</button>
              <div class="cal-month" id="cal-month-label"></div>
              <button class="cal-nav-btn" onclick="changeMonth(1)">→</button>
            </div>
            <div class="cal-day-headers">
              <div class="cal-day-header">Mon</div>
              <div class="cal-day-header">Tue</div>
              <div class="cal-day-header">Wed</div>
              <div class="cal-day-header">Thu</div>
              <div class="cal-day-header">Fri</div>
              <div class="cal-day-header">Sat</div>
              <div class="cal-day-header">Sun</div>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
          </div>

          <!-- List View -->
          <div class="cal-list" id="cal-list-view"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Popover -->
  <div class="cal-popover" id="cal-popover"></div>

  <!-- Schedule Modal -->
  <div class="modal-overlay" id="schedule-modal">
    <div class="modal" style="position:relative;max-width:440px;">
      <button class="modal-close" onclick="closeScheduleModal()">✕</button>
      <h2 class="h2" style="margin-bottom:16px;">Schedule Calibration</h2>
      <div class="input-group">
        <label class="field-label">Device</label>
        <select class="input-field" id="sched-device"></select>
      </div>
      <div class="input-group">
        <label class="field-label">Preferred Date</label>
        <input type="date" class="input-field" id="sched-date">
      </div>
      <div class="input-group">
        <label class="field-label">Vendor</label>
        <select class="input-field" id="sched-vendor"></select>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
        <button class="btn btn-secondary btn-sm" onclick="closeScheduleModal()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="showToast('Calibration scheduled ✓','success');closeScheduleModal();">Confirm</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    buildTopNav('Calendar');
    buildSidebar('Calendar');

    let currentDate = new Date();
    let currentView = 'month';
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // Populate filters
    const locFilters = document.getElementById('loc-filters');
    DEMO_LOCATIONS.forEach(l => {
      locFilters.innerHTML += `<label class="checkbox-custom" style="margin-bottom:8px;"><input type="checkbox" checked onchange="renderCalendar()"><span class="checkmark"></span>${l.name}</label>`;
    });
    const catFilters = document.getElementById('cat-filters');
    ['Pressure','Temperature','Electrical','Weight','Flow','Other'].forEach(c => {
      catFilters.innerHTML += `<label class="checkbox-custom" style="margin-bottom:8px;"><input type="checkbox" checked onchange="renderCalendar()"><span class="checkmark"></span>${c}</label>`;
    });

    function setView(view) {
      currentView = view;
      document.querySelectorAll('#view-toggle .segment-btn').forEach((b,i) => {
        b.classList.toggle('active', ['month','week','list'][i] === view);
      });
      document.getElementById('cal-month-view').style.display = view === 'list' ? 'none' : 'block';
      document.getElementById('cal-list-view').classList.toggle('active', view === 'list');
      renderCalendar();
    }

    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('cal-month-label').textContent = `${months[month]} ${year}`;

      // Build events map from equipment due dates
      const events = {};
      DEMO_EQUIPMENT.forEach(e => {
        if (!e.active || !e.next_due_date) return;
        const dateKey = e.next_due_date;
        if (!events[dateKey]) events[dateKey] = [];
        const days = daysUntil(e.next_due_date);
        let status = 'compliant';
        if (days <= 0) status = 'overdue';
        else if (days <= 30) status = 'due-soon';
        events[dateKey].push({ ...e, _status: status });
      });

      if (currentView === 'list') {
        renderListView(events);
        return;
      }

      const grid = document.getElementById('cal-grid');
      const firstDay = new Date(year, month, 1);
      let startDay = firstDay.getDay(); // 0=Sun
      startDay = startDay === 0 ? 6 : startDay - 1; // Convert to Mon=0

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const today = new Date();
      today.setHours(0,0,0,0);

      let html = '';
      const totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;

      for (let i = 0; i < totalCells; i++) {
        let day, dateStr, isOther = false;

        if (i < startDay) {
          day = daysInPrevMonth - startDay + i + 1;
          dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          isOther = true;
        } else if (i >= startDay + daysInMonth) {
          day = i - startDay - daysInMonth + 1;
          dateStr = `${year}-${String(month + 2).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          isOther = true;
        } else {
          day = i - startDay + 1;
          dateStr = `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        }

        const cellDate = new Date(isOther ? dateStr : `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
        const isToday = !isOther && cellDate.getTime() === today.getTime();

        const dayEvents = events[dateStr] || [];

        html += `<div class="cal-cell ${isToday ? 'today' : ''} ${isOther ? 'other-month' : ''}">
          <div class="cal-day-num">${day}</div>
          ${dayEvents.slice(0, 3).map(ev => `
            <div class="cal-event ${ev._status}" onclick="showPopover(event, ${ev.id}, '${ev.name}', '${ev.serial_number}', '${ev.location}', '${ev._status}')">
              <span class="cal-event-dot"></span>
              ${ev.name.length > 15 ? ev.name.slice(0,15) + '…' : ev.name}
            </div>
          `).join('')}
          ${dayEvents.length > 3 ? `<div style="font-family:var(--mono);font-size:9px;color:var(--muted);padding:2px 4px;">+${dayEvents.length - 3} more</div>` : ''}
        </div>`;
      }

      grid.innerHTML = html;
    }

    function renderListView(events) {
      const sortedDates = Object.keys(events).sort();
      const listView = document.getElementById('cal-list-view');

      if (sortedDates.length === 0) {
        listView.innerHTML = '<div class="empty-state"><div class="empty-state-title">No upcoming calibrations</div></div>';
        return;
      }

      listView.innerHTML = sortedDates.map(date => `
        <div class="list-date-group">
          <div class="list-date">${formatDateFull(date)}</div>
          ${events[date].map(e => `
            <div class="list-item" onclick="location.href='equipment-detail.html?id=${e.id}'">
              <span class="cal-event-dot" style="width:8px;height:8px;border-radius:50;background:${e._status === 'overdue' ? '#EF4444' : e._status === 'due-soon' ? '#F59E0B' : '#10B981'};flex-shrink:0;"></span>
              <span style="flex:1;font-family:var(--sans);font-size:14px;color:var(--white);font-weight:500;">${e.name}</span>
              <span style="font-family:var(--mono);font-size:11px;color:var(--muted);">${e.serial_number}</span>
              <span style="font-family:var(--sans);font-size:13px;color:var(--muted);">${e.location}</span>
              ${getStatusBadge(e._status === 'due-soon' ? 'due_soon' : e._status)}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function showPopover(event, id, name, serial, location, status) {
      event.stopPropagation();
      const pop = document.getElementById('cal-popover');
      const statusLabel = status === 'due-soon' ? 'due_soon' : status;
      pop.innerHTML = `
        <div class="pop-name">${name}</div>
        <div class="pop-info">${serial}</div>
        <div class="pop-info">${location}</div>
        <div style="margin-top:8px;">${getStatusBadge(statusLabel)}</div>
        <a href="equipment-detail.html?id=${id}" class="pop-link">View Device →</a>
      `;
      pop.classList.add('active');
      pop.style.left = event.clientX + 'px';
      pop.style.top = (event.clientY + 10) + 'px';

      // Adjust if off screen
      setTimeout(() => {
        const rect = pop.getBoundingClientRect();
        if (rect.right > window.innerWidth) pop.style.left = (window.innerWidth - rect.width - 16) + 'px';
        if (rect.bottom > window.innerHeight) pop.style.top = (event.clientY - rect.height - 10) + 'px';
      }, 0);
    }

    document.addEventListener('click', () => {
      document.getElementById('cal-popover').classList.remove('active');
    });

    // Schedule Modal
    function openScheduleModal() {
      document.getElementById('schedule-modal').classList.add('active');
      const devSel = document.getElementById('sched-device');
      devSel.innerHTML = '<option value="">Select device</option>';
      DEMO_EQUIPMENT.forEach(e => devSel.innerHTML += `<option value="${e.id}">${e.name}</option>`);
      const vendorSel = document.getElementById('sched-vendor');
      vendorSel.innerHTML = '<option value="">Select vendor</option>';
      DEMO_VENDORS.forEach(v => vendorSel.innerHTML += `<option>${v.name}</option>`);
    }
    function closeScheduleModal() { document.getElementById('schedule-modal').classList.remove('active'); }

    renderCalendar();
  </script>
</body>
</html>
